name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow (dimensiones de imagen, anti-CLS)
        run: pip install pillow

      - name: Build site
        run: python3 build.py

      - name: Sanity checks
        run: |
          test -f dist/index.html
          test -f dist/visita/index.html
          test -f dist/aves/index.html
          test -f dist/sitemap.xml
          test -f dist/robots.txt
          test -f dist/favicon.svg
          n=$(find dist -name index.html | wc -l)
          echo "Generadas $n paginas"
          test "$n" -ge 12
          for f in $(find dist -name index.html); do
            h=$(grep -o '<h1' "$f" | wc -l)
            test "$h" -eq 1 || { echo "FALLO: $f tiene $h h1"; exit 1; }
          done
          bad=$(grep -rho '<img [^>]*>' dist --include=index.html | grep -vc 'width=' || true)
          echo "img sin width: $bad"
          test "$bad" -eq 0

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: corrales-web-dist
          path: dist/

  reservas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sintaxis PHP del motor de reservas
        run: |
          if [ ! -d reservas ]; then echo "sin carpeta reservas"; exit 0; fi
          find reservas -name '*.php' -print0 | xargs -0 -r -n1 php -l

      - name: config.php no debe estar versionado
        run: |
          test ! -f reservas/config.php || { echo "FALLO: reservas/config.php esta en el repo"; exit 1; }

      - name: Migraciones numeradas y sin duplicar
        run: |
          ls reservas/migraciones/*.sql >/dev/null
          dup=$(ls reservas/migraciones/*.sql | xargs -n1 basename | cut -d_ -f1 | sort | uniq -d)
          test -z "$dup" || { echo "FALLO: prefijos repetidos: $dup"; exit 1; }
